<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Wilson Family Data Editor</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; background: #f9fafb; padding: 2rem; color: #111827; }
    .card { background: #fff; padding: 1.25rem; border-radius: 10px; box-shadow: 0 6px 18px rgba(15,23,42,0.06); max-width: 920px; margin: 0 auto; }
    h1 { margin: 0 0 0.75rem 0; font-size: 1.4rem; }
    form { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    label { display:block; font-size: 0.9rem; }
    input[type=text], input[type=number], select { width:100%; padding:0.5rem; border:1px solid #d1d5db; border-radius:6px; font-size:0.95rem; }
    .full { grid-column: 1 / -1; }
    button { margin-top: 0.5rem; padding: 0.6rem 0.9rem; font-size: 1rem; cursor: pointer; border-radius: 8px; border: none; background: #2563eb; color: white; }
    #output { margin-top: 1rem; background: #fff; padding: 1rem; border-radius: 8px; white-space: pre-wrap; max-height: 360px; overflow:auto; }
    #status { margin-bottom: 0.75rem; font-weight: 600; }
    .row { display:flex; gap:0.5rem; align-items:center; }

    /* simple autocomplete dropdown */
    .suggestions { position: absolute; background: white; border: 1px solid #e5e7eb; border-radius:6px; width:100%; max-height: 200px; overflow:auto; z-index: 50; box-shadow: 0 6px 18px rgba(15,23,42,0.06); }
    .suggestion { padding: 0.4rem 0.6rem; cursor: pointer; }
    .suggestion:hover { background: #f3f4f6; }
    .control { position: relative; }
    .note { font-size:0.85rem; color:#6b7280; }
    .spouse-new { display:flex; gap:0.5rem; }
    @media (max-width:700px){ form { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="card">
    <h1>Wilson Family Data Updater</h1>
    <div id="status">Loading data from GitHub...</div>

    <form id="form" style="display:none" onsubmit="handleSubmit(event)">
      <label class="full">Name: <input id="name" type="text" required /></label>
      <label>Birth Year: <input id="birthyear" type="text" /></label>
      <label>Death Year: <input id="deathyear" type="text" /></label>
      <label>Birthplace: <input id="birthplace" type="text" /></label>
      <label>Deathplace: <input id="deathplace" type="text" /></label>

      <!-- Parents: searchable dropdowns -->
      <div class="control">
        <label>Parent A:</label>
        <input id="parentA_input" type="text" placeholder="Type to search parent A..." autocomplete="off" />
        <input id="parentA_id" type="hidden" />
        <div id="parentA_suggestions" class="suggestions" style="display:none"></div>
      </div>

      <div class="control">
        <label>Parent B:</label>
        <input id="parentB_input" type="text" placeholder="Type to search parent B..." autocomplete="off" />
        <input id="parentB_id" type="hidden" />
        <div id="parentB_suggestions" class="suggestions" style="display:none"></div>
      </div>

      <!-- Spouse: searchable dropdown + "add new" field -->
      <div class="control full">
        <label>Spouse (select existing or type a new name below):</label>
        <div style="display:flex;gap:0.5rem;align-items:center;">
          <div style="flex:1; position:relative;">
            <input id="spouse_input" type="text" placeholder="Search existing spouse..." autocomplete="off" />
            <input id="spouse_id" type="hidden" />
            <div id="spouse_suggestions" class="suggestions" style="display:none"></div>
          </div>
          <div style="flex:1;">
            <input id="spouse_new" type="text" placeholder="Or type new spouse name (will be created)" />
          </div>
        </div>
        <div class="note">Parent selection must be chosen from the lists. Spouse can be an existing person or a new one typed here.</div>
      </div>

      <div class="full row">
        <button type="submit">Generate Updated data_wilson.js</button>
      </div>
    </form>

    <pre id="output"></pre>
  </div>

<script>
// ---------------------- Data loading & parsing ----------------------
let data = null;
async function loadData() {
  const url = "https://koka-noodles.github.io/Ftree.09.22/data/data_wilson.js";
  try {
    const text = await fetch(url).then(r => r.text());

    const cleanText = text
      .replace(/^export\s+default\s+/m, "")
      .replace(/^const\s+data\s*=\s*/m, "")
      .replace(/^let\s+data\s*=\s*/m, "")
      .replace(/^var\s+data\s*=\s*/m, "")
      .replace(/^data\s*=\s*/m, "")
      .replace(/;?\s*$/, "");

    try {
      data = eval("(" + cleanText + ")");
      document.getElementById('status').textContent = '✅ Data loaded successfully.';
      document.getElementById('form').style.display = 'grid';
      populateParentDropdowns();
    } catch (err) {
      console.error('Parse error:', err);
      document.getElementById('status').textContent = '❌ Could not parse data file (format issue). See console.';
    }
  } catch (err) {
    console.error('Fetch error:', err);
    document.getElementById('status').textContent = '❌ Failed to load data file (fetch issue).';
  }
}

loadData();

// ---------------------- Utility ID helpers ----------------------
function nextPersonId() {
  const ids = Object.keys(data.persons).filter(k => k.startsWith('id')).map(k => parseInt(k.replace('id',''),10));
  return 'id' + (Math.max(0, ...ids) + 1);
}
function nextUnionId() {
  const ids = Object.keys(data.unions).filter(k => k.startsWith('u')).map(k => parseInt(k.replace('u',''),10));
  return 'u' + (Math.max(0, ...ids) + 1);
}

// ---------------------- Populate searchable lists ----------------------
function populateParentDropdowns() {
  // Build a list of people (id + display name)
  const people = Object.values(data.persons).map(p => ({ id: p.id, name: p.name || p.id }));
  // sort alphabetically by normalized name
  people.sort((a,b) => a.name.localeCompare(b.name));

  // initialize autocomplete widgets
  setupAutocomplete('parentA_input','parentA_id','parentA_suggestions', people);
  setupAutocomplete('parentB_input','parentB_id','parentB_suggestions', people);
  setupAutocomplete('spouse_input','spouse_id','spouse_suggestions', people);
}

// Simple autocomplete widget
function setupAutocomplete(inputId, hiddenId, suggContainerId, items) {
  const input = document.getElementById(inputId);
  const hidden = document.getElementById(hiddenId);
  const box = document.getElementById(suggContainerId);

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    if (!q) { box.style.display = 'none'; hidden.value = ''; return; }
    const matches = items.filter(it => it.name.toLowerCase().includes(q));
    renderSuggestions(matches.slice(0,60), box, (it)=>{
      input.value = it.name;
      hidden.value = it.id;
      box.style.display = 'none';
    });
  });

  input.addEventListener('focus', () => {
    const q = input.value.trim().toLowerCase();
    const matches = items.filter(it => it.name.toLowerCase().includes(q));
    if (matches.length) { renderSuggestions(matches.slice(0,60), box, (it)=>{ input.value = it.name; hidden.value = it.id; box.style.display='none'; }); }
  });

  // Clear selection if user edits text after choosing
  input.addEventListener('keydown', (ev) => {
    if (ev.key === 'Backspace' || ev.key === 'Delete') hidden.value = '';
  });

  // click-away closes
  document.addEventListener('click', (ev)=>{
    if (!box.contains(ev.target) && ev.target !== input) box.style.display='none';
  });
}

function renderSuggestions(list, box, onClick) {
  box.innerHTML = '';
  if (!list.length) { box.style.display='none'; return; }
  for (const it of list) {
    const div = document.createElement('div');
    div.className = 'suggestion';
    div.textContent = it.name + ' \u00A0 ' + '(' + it.id + ')';
    div.addEventListener('click', ()=> onClick(it) );
    box.appendChild(div);
  }
  box.style.display = 'block';
}

// ---------------------- Main submit / insert logic ----------------------
function handleSubmit(ev) {
  ev.preventDefault();
  // collect form values
  const name = document.getElementById('name').value.trim();
  if (!name) return alert('Name is required');
  const birthyear = document.getElementById('birthyear').value || '.';
  const deathyear = document.getElementById('deathyear').value || '.';
  const birthplace = document.getElementById('birthplace').value || '?';
  const deathplace = document.getElementById('deathplace').value || '?';

  // parents selected via dropdown must provide ids
  const parentA_id = document.getElementById('parentA_id').value || null;
  const parentB_id = document.getElementById('parentB_id').value || null;
  const parentIds = [];
  if (parentA_id) parentIds.push(parentA_id);
  if (parentB_id) parentIds.push(parentB_id);

  // spouse: either existing selected id, or new typed name
  const spouse_existing_id = document.getElementById('spouse_id').value || null;
  const spouse_new_name = document.getElementById('spouse_new').value.trim() || null;

  // create new person
  const newId = nextPersonId();
  data.persons[newId] = {
    id: newId,
    name,
    birthyear,
    deathyear,
    birthplace,
    deathplace,
    own_unions: []
  };

  // HANDLE PARENTS: if exactly two parent IDs are provided, link to their union
  if (parentIds.length === 2) {
    const [p1, p2] = parentIds;
    // try find parent union where these two are partners
    let parentUnionId = Object.keys(data.unions).find(uid => {
      const un = data.unions[uid];
      return un.partner && un.partner.includes(p1) && un.partner.includes(p2);
    });
    // If no union exists for these parents, create a new union and add partner->union links
    if (!parentUnionId) {
      parentUnionId = nextUnionId();
      data.unions[parentUnionId] = { id: parentUnionId, partner: [p1, p2], children: [] };
      data.links.push([p1, parentUnionId]);
      data.links.push([p2, parentUnionId]);
    }
    // add child to union children, add union->child link and set child's parent_union
    data.unions[parentUnionId].children.push(newId);
    data.links.push([parentUnionId, newId]);
    data.persons[newId].parent_union = parentUnionId;
  } else if (parentIds.length > 0 && parentIds.length !== 2) {
    alert('Please select exactly two parents (or none).');
    // remove added person to keep data clean
    delete data.persons[newId];
    return;
  }

  // HANDLE SPOUSE: prefer typed-new spouse if provided; otherwise use selected existing
  let spouseIdToUse = null;
  if (spouse_new_name) {
    // create new spouse person
    spouseIdToUse = nextPersonId();
    data.persons[spouseIdToUse] = { id: spouseIdToUse, name: spouse_new_name, birthyear: '.', deathyear: '.', birthplace: '?', deathplace: '?', own_unions: [] };
  } else if (spouse_existing_id) {
    spouseIdToUse = spouse_existing_id;
  }

  if (spouseIdToUse) {
    // create union between new person and spouse
    const unionId = nextUnionId();
    data.unions[unionId] = { id: unionId, partner: [newId, spouseIdToUse], children: [] };

    // update persons' own_unions arrays
    if (!Array.isArray(data.persons[newId].own_unions)) data.persons[newId].own_unions = [];
    if (!Array.isArray(data.persons[spouseIdToUse].own_unions)) data.persons[spouseIdToUse].own_unions = [];
    data.persons[newId].own_unions.push(unionId);
    data.persons[spouseIdToUse].own_unions.push(unionId);

    // add partner->union links
    data.links.push([newId, unionId]);
    data.links.push([spouseIdToUse, unionId]);
  }

  // Serialize and show
  const output = 'data = ' + JSON.stringify(data, null, 4);
  document.getElementById('output').textContent = output;

  // Trigger download
  const blob = new Blob([output], { type: 'text/javascript' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'data_wilson.js';
  a.click();
  URL.revokeObjectURL(url);

  // reset form fields (but keep lists)
  document.getElementById('form').reset();
  document.getElementById('parentA_id').value = '';
  document.getElementById('parentB_id').value = '';
  document.getElementById('spouse_id').value = '';
  document.getElementById('parentA_suggestions').style.display = 'none';
  document.getElementById('parentB_suggestions').style.display = 'none';
  document.getElementById('spouse_suggestions').style.display = 'none';

  // re-populate so new person appears in lists
  populateParentDropdowns();
  alert('New person added and file prepared for download. Remember to commit the downloaded file to your repo.');
}
</script>
  <!-- Assign Parents to Existing Person -->
  <div class="card" style="margin-top:1.5rem;">
    <h1>Assign Parents to Existing Person</h1>
    <form id="assignParentsForm" onsubmit="handleAssignParents(event)">
      <label class="full">Select Person:
        <div class="control">
          <input id="assign_child_input" type="text" placeholder="Search person..." autocomplete="off" />
          <input id="assign_child_id" type="hidden" />
          <div id="assign_child_suggestions" class="suggestions" style="display:none"></div>
        </div>
      </label>

      <div class="control">
        <label>Parent A:</label>
        <input id="assign_parentA_input" type="text" placeholder="Type to search Parent A..." autocomplete="off" />
        <input id="assign_parentA_id" type="hidden" />
        <div id="assign_parentA_suggestions" class="suggestions" style="display:none"></div>
      </div>

      <div class="control">
        <label>Parent B:</label>
        <input id="assign_parentB_input" type="text" placeholder="Type to search Parent B..." autocomplete="off" />
        <input id="assign_parentB_id" type="hidden" />
        <div id="assign_parentB_suggestions" class="suggestions" style="display:none"></div>
      </div>

      <div class="full row">
        <button type="submit">Assign Parents</button>
      </div>
    </form>
  </div>

<script>
// ---------------------- Assign Parents Logic ----------------------
function setupAssignAutocomplete() {
  const people = Object.values(data.persons).map(p => ({ id: p.id, name: p.name || p.id })).sort((a,b)=>a.name.localeCompare(b.name));

  setupAutocomplete('assign_child_input','assign_child_id','assign_child_suggestions',people);
  setupAutocomplete('assign_parentA_input','assign_parentA_id','assign_parentA_suggestions',people);
  setupAutocomplete('assign_parentB_input','assign_parentB_id','assign_parentB_suggestions',people);
}

function handleAssignParents(ev) {
  ev.preventDefault();

  const childId = document.getElementById('assign_child_id').value;
  const parentA_hidden = document.getElementById('assign_parentA_id').value;
  const parentB_hidden = document.getElementById('assign_parentB_id').value;
  const parentA_input = document.getElementById('assign_parentA_input').value.trim();
  const parentB_input = document.getElementById('assign_parentB_input').value.trim();

  if (!childId) return alert('Select a person to assign parents to.');
  // Allow creation of new parents if user typed names instead of selecting
  let parentA = parentA_hidden || null;
  let parentB = parentB_hidden || null;

  // Create parent A if not selected but a name was typed
  if (!parentA && parentA_input) {
    parentA = nextPersonId();
    data.persons[parentA] = {
      id: parentA,
      name: parentA_input,
      birthyear: '.',
      deathyear: '.',
      birthplace: '?',
      deathplace: '?',
      own_unions: []
    };
    // ensure new person appears in UI
    console.info('Created new parent A:', parentA, parentA_input);
  }

  // Create parent B if not selected but a name was typed
  if (!parentB && parentB_input) {
    parentB = nextPersonId();
    data.persons[parentB] = {
      id: parentB,
      name: parentB_input,
      birthyear: '.',
      deathyear: '.',
      birthplace: '?',
      deathplace: '?',
      own_unions: []
    };
    console.info('Created new parent B:', parentB, parentB_input);
  }

  if (!parentA || !parentB) return alert('Select or type both parents.');

  const child = data.persons[childId];

  // If child already has parents, confirm overwrite
  if (child.parent_union) {
    if (!confirm('This person already has parents. Overwrite existing parents?')) return;

    const oldUnion = data.unions[child.parent_union];
    if (oldUnion) {
      oldUnion.children = oldUnion.children.filter(cid => cid !== childId);
    }

    data.links = data.links.filter(l => !(l[0] === child.parent_union && l[1] === childId));
  }

  // Find or create union for selected parents
  let unionId = Object.keys(data.unions).find(uid => {
    const u = data.unions[uid];
    return u.partner && u.partner.includes(parentA) && u.partner.includes(parentB);
  });

  if (!unionId) {
    unionId = nextUnionId();
    data.unions[unionId] = { id: unionId, partner: [parentA, parentB], children: [] };
    data.links.push([parentA, unionId]);
    data.links.push([parentB, unionId]);
  }

  // Assign child
  // avoid duplicate child entries
  if (!data.unions[unionId].children.includes(childId)) data.unions[unionId].children.push(childId);
  data.links.push([unionId, childId]);
  child.parent_union = unionId;

  // re-render
  const output = 'data = ' + JSON.stringify(data, null, 4);
  document.getElementById('output').textContent = output;

  const blob = new Blob([output], { type: 'text/javascript' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'data_wilson.js'; a.click(); URL.revokeObjectURL(url);

  alert('Parents assigned (new parents created if needed). Download the updated file and commit to GitHub.');
  setupAssignAutocomplete();
}

// Initialize assignment autocomplete when data loads
setTimeout(()=>{ if (data) setupAssignAutocomplete(); },1500);
</script>

</body>
</html>
